name: prime-cache-27bf0cc

on:
  push:

jobs:
  cache-job:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: prime-cache-27bf0cc
        id: prime-cache-27bf0cc
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: cache-27bf0cc

      - name: verify-cache
        run: echo "Cache hit: ${{ steps.prime-cache-27bf0cc.outputs.cache-hit }}"

      - name: install-deps
        run: |
          python -m pip install --upgrade pip
          pip install fastapi
